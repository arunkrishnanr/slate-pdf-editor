name: Build Windows portable exe

# Builds the single-file portable Tirut PDF.exe on a Windows runner.
# Trigger manually (Actions tab -> Run workflow) or on a version tag push.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python tools/make_icon.py

      - name: Build portable exe
        run: pyinstaller packaging/Slate.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TirutPDF-windows-portable
          path: "dist/Tirut PDF.exe"
          if-no-files-found: error
