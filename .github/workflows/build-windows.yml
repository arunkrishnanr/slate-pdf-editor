name: Build Windows package

# Builds Tirut PDF for Windows with a bundled, self-contained Tesseract OCR engine,
# and (if Inno Setup is available) a signed-ready installer.
# Trigger manually (Actions tab -> Run workflow) or on a version tag push.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Bundle Tesseract into vendor/  (self-contained OCR — never touches the system)
        shell: pwsh
        run: |
          choco install tesseract --no-progress -y
          $src = "C:\Program Files\Tesseract-OCR"
          if (!(Test-Path $src)) { $src = "C:\Program Files (x86)\Tesseract-OCR" }
          $bin = "vendor\tesseract\bin"; $td = "vendor\tesseract\share\tessdata"
          New-Item -ItemType Directory -Force -Path $bin, $td | Out-Null
          # tesseract.exe + its co-located DLLs
          Copy-Item "$src\tesseract.exe" $bin
          Copy-Item "$src\*.dll" $bin -ErrorAction SilentlyContinue
          # language data (English + orientation/script)
          Copy-Item "$src\tessdata\eng.traineddata" $td
          Copy-Item "$src\tessdata\osd.traineddata" $td -ErrorAction SilentlyContinue
          & "$bin\tesseract.exe" --version

      - name: Generate icon
        run: python tools/make_icon.py

      - name: Build app (one-folder; PyInstaller bundles vendor/ alongside the exe)
        run: pyinstaller packaging/Slate.spec --noconfirm

      - name: Smoke-check the build (exe + bundled Tesseract present)
        shell: pwsh
        run: |
          $app = "dist\Tirut PDF\Tirut PDF.exe"
          if (!(Test-Path $app)) { throw "Build did not produce $app" }
          # PyInstaller 6.x onedir keeps everything but the exe under _internal\, so
          # find the bundled tesseract.exe wherever it landed under the app folder.
          $tess = Get-ChildItem -Path "dist\Tirut PDF" -Recurse -Filter tesseract.exe |
                  Select-Object -First 1
          if (-not $tess) { throw "Bundled Tesseract missing under dist\Tirut PDF" }
          & $tess.FullName --version
          Write-Host "OK: app at '$app'; tesseract at '$($tess.FullName)'"

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows_installer.iss
        continue-on-error: true   # portable folder still ships even if the installer step is unavailable

      - name: Upload portable (the one-folder app, zipped — copy-and-run, no install)
        uses: actions/upload-artifact@v4
        with:
          name: TirutPDF-windows-portable
          path: "dist/Tirut PDF/"
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TirutPDF-windows-installer
          path: "dist/TirutPDF-Setup.exe"
          if-no-files-found: error   # the installer is a required deliverable — fail loudly if missing
